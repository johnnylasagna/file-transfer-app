<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
	<!-- Remove this to allow Live Preview on VS Code-->
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'" />
	<meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
	<title>Hello from Electron renderer!</title>
	<link rel="stylesheet" href="./styles.css">

</head>

<body>
	<div class="tab" id="Sharing">
		<div class="main-wrapper">
			<span class="main-wrapper-heading">
				Server Settings:
			</span>
			<div class="wrapper">
				<div>Folder Path:
					<span id="folderPath">
					</span>
				</div>
				<div class="button-wrapper">
					<button type="button" id="folderBtn" class="dialog-button">Open a folder</button>
					<button type="button" id="folderServerBtn" class="dialog-button">Start folder transfer
						server</button>
				</div>
			</div>
			<div class="wrapper">
				<span>Add Files</span>
				<div class="button-wrapper">
					<button type="button" id="addFiles" class="dialog-button">Add files</button>
				</div>
			</div>
		</div>
		<div class="main-wrapper">
			<span class="main-wrapper-heading">
				Host Settings:
			</span>
			<div class="wrapper">
				<span>Hostname</span>
				<input type="text" id="broadcastName" />
			</div>
		</div>
		<div class="main-wrapper">
			<span class="main-wrapper-heading">
				Authentication Settings
			</span>
			<div class="wrapper">
				<span>Username</span>
				<input type="text" id="broadcastName" />
				<span>Password</span>
				<input type="text" id="broadcastName" />
				<button type="button" id="folderServerBtn" class="dialog-button">Update Credentials</button>
			</div>
		</div>
	</div>

</body>
<script src="./renderer.js"></script>

</html>
