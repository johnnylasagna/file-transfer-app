<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Browser</title>
    <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div class="browser">
        <div class="panel-content">
            <fluent-label weight="semibold" style="font-size: 24px;">File Browser</fluent-label>
            <div id="file-list"></div>
        </div>
    </div>

    <div class="cart">
        <div class="panel-content">
            <fluent-label weight="semibold" style="font-size: 20px;">Download Cart</fluent-label>
            <ul id="cart-list"></ul>
            <div class="control-group">
                <fluent-button id="downloadBtn" appearance="accent" disabled>Download All as ZIP</fluent-button>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
