<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script type="module" src="https://unpkg.com/@fluentui/web-components"></script>
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f2f1;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 300px;
        }
        .error {
            color: red;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <fluent-label weight="semibold" style="font-size: 24px; text-align: center;">Login</fluent-label>
        <fluent-text-field id="username" placeholder="Username"></fluent-text-field>
        <fluent-text-field id="password" type="password" placeholder="Password"></fluent-text-field>
        <div id="error-msg" class="error">Invalid username or password.</div>
        <fluent-button appearance="accent" id="loginBtn">Login</fluent-button>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                errorMsg.style.display = 'block';
            }
        });
        
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
